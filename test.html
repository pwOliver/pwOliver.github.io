<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>奖项列表</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 40px;
        }
        table {
            width: 60%;
            margin: auto;
            background-color: #fff;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #ccc;
        }
        th {
            background-color: #e8e8e8;
        }
        caption {
            font-size: 24px;
            font-weight: bold;
            padding: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <caption>我的奖项</caption>
        <thead>
            <tr>
                <th>奖项名称</th>
                <th>颁奖单位</th>
                <th>时间</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>国家奖学金</td>
                <td>中华人民共和国教育部</td>
                <td>2023年10月</td>
            </tr>
            <!-- 你可以在这里添加更多奖项 -->
        </tbody>
    </table>
</body>
</html>
